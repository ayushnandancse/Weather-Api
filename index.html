<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Search View (Home) -->
        <div id="search-view" class="view active">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search city..." autocomplete="off">
                <ul id="suggestions" class="suggestions-list hidden"></ul>
            </div>
        </div>

        <!-- Weather Dashboard View -->
        <div id="weather-view" class="view hidden">
            <button id="back-btn" class="glass-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Search
            </button>
            
            <div class="weather-dashboard glass-panel">
                <div class="current-weather">
                    <h1 id="city-name">San Francisco</h1>
                    <div class="temp-container">
                        <div id="weather-icon">☀️</div>
                        <span id="current-temp">--°</span>
                    </div>
                    <p id="weather-desc">Loading...</p>
                </div>
                
                <div class="weather-metrics">
                    <div class="metric glass-panel-inner">
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity">--%</span>
                    </div>
                    <div class="metric glass-panel-inner">
                        <span class="label">Wind</span>
                        <span class="value" id="wind">-- km/h</span>
                    </div>
                    <div class="metric glass-panel-inner">
                        <span class="label">UV Index</span>
                        <span class="value" id="uv">--</span>
                    </div>
                    <div class="metric glass-panel-inner">
                        <span class="label">Feels Like</span>
                        <span class="value" id="feels-like">--°</span>
                    </div>
                </div>
                
                <div class="forecast">
                    <h2>3-Day Forecast</h2>
                    <div id="forecast-list" class="forecast-list">
                        <!-- Forecast items injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
